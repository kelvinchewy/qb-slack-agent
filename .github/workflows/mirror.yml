name: Mirror to kelvinhashing

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to kelvinhashing mirror
        run: |
          git remote add mirror https://kelvinhashing:${{ secrets.MIRROR_TOKEN }}@github.com/kelvinhashing/qb-slack-agent.git
          git push mirror main --force